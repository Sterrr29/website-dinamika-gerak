<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulasi Hukum Newton 2 - Gaya & Gesekan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      background: linear-gradient(135deg, 
        #8b5cf6 0%, 
        #a855f7 25%, 
        #c084fc 50%, 
        #d8b4fe 75%, 
        #e9d5ff 100%);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(168,85,247,0.3) 1px, transparent 1px),
        radial-gradient(circle at 40% 90%, rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 100px 100px, 150px 150px, 200px 200px;
      animation: sparkle 20s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes sparkle {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(20px, 20px) rotate(360deg); }
    }

    canvas { 
      display: block; 
      margin: 20px auto; 
      border: 3px solid rgba(168, 85, 247, 0.6);
      border-radius: 20px;
      box-shadow: 
        0 20px 60px rgba(139, 92, 246, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 0 30px rgba(168, 85, 247, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    canvas:hover {
      box-shadow: 
        0 25px 80px rgba(139, 92, 246, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        0 0 40px rgba(168, 85, 247, 0.5);
    }

    @media (max-width: 900px) {
      canvas {
        width: 95vw;
        height: 60vh;
        max-width: 800px;
        max-height: 500px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="900" height="600"></canvas>
  
  <script>
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var mouseX, mouseY;
    var dragging = false;
    var activeSlider = null;

    // Responsive canvas
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.min(900, window.innerWidth * 0.95);
      canvas.height = Math.min(600, window.innerHeight * 0.75);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Fungsi dasar untuk canvas - Ditingkatkan dengan tema ungu
    function aturCanvas() {
      // Canvas responsive sudah diatur
    }

    function setJudul(title) {
      document.title = title;
    }

    function hapusLayar(color) {
      // Gradient background ungu
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
      gradient.addColorStop(0.5, 'rgba(168, 85, 247, 0.2)');
      gradient.addColorStop(1, 'rgba(200, 132, 252, 0.25)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid halus ungu
      ctx.strokeStyle = 'rgba(168, 85, 247, 0.1)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function teks(text, x, y, font, color, align) {
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.textAlign = align || 'left';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
    }

    function kotak(x, y, w, h, stroke, strokeColor, fillColor) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 8);
      if (fillColor) {
        // Gradient untuk kotak
        const gradient = ctx.createRadialGradient(x + w/4, y + h/4, 0, x + w/2, y + h/2, w);
        gradient.addColorStop(0, fillColor);
        gradient.addColorStop(1, fillColor + '80');
        ctx.fillStyle = gradient;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = stroke;
        ctx.lineJoin = 'round';
        ctx.stroke();
      }
    }

    function garis(x1, y1, x2, y2, width, color) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowBlur = 8;
      ctx.shadowColor = color + '80';
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function panah(x, y, dx, dy, headLen, width, color) {
      var angle = Math.atan2(dy, dx);
      var len = Math.sqrt(dx*dx + dy*dy);
      
      // Garis panah dengan glow
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + dx, y + dy);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.shadowBlur = 12;
      ctx.shadowColor = color + 'CC';
      ctx.stroke();
      
      // Head panah - gradient dan glow
      const headGradient = ctx.createRadialGradient(
        x + dx, y + dy, 0,
        x + dx, y + dy, headLen * 1.5
      );
      headGradient.addColorStop(0, color);
      headGradient.addColorStop(0.7, color + 'FF');
      headGradient.addColorStop(1, color + '80');
      
      ctx.beginPath();
      ctx.moveTo(x + dx, y + dy);
      ctx.lineTo(x + dx - headLen * Math.cos(angle - Math.PI/6), 
                 y + dy - headLen * Math.sin(angle - Math.PI/6));
      ctx.lineTo(x + dx - headLen * Math.cos(angle + Math.PI/6), 
                 y + dy - headLen * Math.sin(angle + Math.PI/6));
      ctx.closePath();
      ctx.fillStyle = headGradient;
      ctx.shadowBlur = 16;
      ctx.shadowColor = color + 'FF';
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // Outline halus
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function slider(s) {
      // Track slider dengan gradient
      const trackGradient = ctx.createLinearGradient(s.x, s.y + 10, s.x + s.p, s.y + 10);
      trackGradient.addColorStop(0, '#a855f7');
      trackGradient.addColorStop(0.5, '#c084fc');
      trackGradient.addColorStop(1, '#a855f7');
      
      garis(s.x, s.y + 10, s.x + s.p, s.y + 10, 6, trackGradient);
      garis(s.x, s.y + 10, s.x + s.p, s.y + 10, 3, '#ffffff');
      
      // Handle slider dengan glow
      var handleX = s.x + ((s.valS - s.minS) / (s.maxS - s.minS)) * s.p;
      const handleGradient = ctx.createRadialGradient(handleX, s.y + 10, 0, handleX, s.y + 10, 12);
      handleGradient.addColorStop(0, '#e9d5ff');
      handleGradient.addColorStop(0.7, '#d8b4fe');
      handleGradient.addColorStop(1, '#c084fc');
      
      kotak(handleX - 12, s.y, 24, 20, 2, '#9333ea', handleGradient);
      
      // Label dengan gradient text
      const labelGradient = ctx.createLinearGradient(0, s.y + 15, 0, s.y + 30);
      labelGradient.addColorStop(0, '#f3e8ff');
      labelGradient.addColorStop(1, '#e9d5ff');
      teks(s.valS.toFixed(s.desimal) + ' ' + s.label, 
           s.x + s.p + 15, s.y + 15, 'bold 14pt Segoe UI', labelGradient);
    }

    function tombol(label, x, y, w, h, font, textColor, bgColor, borderColor, id) {
      // Tombol dengan gradient dan glow
      const btnGradient = ctx.createRadialGradient(
        x + w/2, y + h/2, 0,
        x + w/2, y + h/2, w/2
      );
      btnGradient.addColorStop(0, '#c084fc');
      btnGradient.addColorStop(0.7, '#a855f7');
      btnGradient.addColorStop(1, '#9333ea');
      
      kotak(x, y, w, h, 3, borderColor || '#ffffff', btnGradient);
      
      // Highlight tombol
      kotak(x + 4, y + 4, w - 8, h - 8, 0, null, 'rgba(255,255,255,0.3)');
      
      teks(label, x + w/2, y + h/2 + 4, font, textColor || '#ffffff', 'center');
      
      // Glow effect
      ctx.shadowColor = '#a855f7';
      ctx.shadowBlur = 15;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      kotak(x - 5, y - 5, w + 10, h + 10, 0, null, 'rgba(168,85,247,0.4)');
      ctx.shadowBlur = 0;
    }

    function cekSlider(event) {
      const rect = canvas.getBoundingClientRect();
      mouseX = event.clientX - rect.left;
      mouseY = event.clientY - rect.top;
      var sliders = [slider1, slider2, slider3];
      for (var s of sliders) {
        var handleX = s.x + ((s.valS - s.minS) / (s.maxS - s.minS)) * s.p;
        if (mouseX >= handleX - 15 && mouseX <= handleX + 15 && 
            mouseY >= s.y - 5 && mouseY <= s.y + 25) {
          return s;
        }
      }
      return null;
    }

    function cekTombol(event) {
      const rect = canvas.getBoundingClientRect();
      mouseX = event.clientX - rect.left;
      mouseY = event.clientY - rect.top;
      // Reset button - posisi disesuaikan
      if (mouseX >= 450 && mouseX <= 620 && mouseY >= 320 && mouseY <= 370) {
        return "Reset";
      }
      return "";
    }

    // Variabel simulasi - posisi disesuaikan untuk canvas responsive
    var slider1 = {tipe:"H", nama:"massa", x:80, y:340, p:220, minS:1, maxS:5, valS:2.0, desimal:1, label:"Kg"};
    var slider2 = {tipe:"H", nama:"gaya", x:80, y:400, p:220, minS:-20, maxS:20, valS:0.0, desimal:1, label:"N"};
    var slider3 = {tipe:"H", nama:"friksi", x:80, y:460, p:220, minS:0, maxS:1, valS:0.0, desimal:3, label:"μ"};

    var index = -1;
    var xBase = 250;
    var yBase = 220;
    var time = 0.0;
    var x = 0.0;
    var v = 0.0;
    var a;
    var m = 2.0;
    var mu = 0;
    var friction = 0;
    var force = 0.0;
    var xPos;
    var yPos;
    var timer;
    var simAktif = 1;
    var bergerak = 0;
    var oldv = 0;

    function setSimulasi() {
      if ((time >= 10000.0)) simAktif = 0;
      if (simAktif == 1) {
        // Hapus layar dengan background ungu
        hapusLayar();

        // Judul utama dengan gradient
        const titleGradient = ctx.createLinearGradient(canvas.width/2 - 150, 40, canvas.width/2 + 150, 60);
        titleGradient.addColorStop(0, '#c084fc');
        titleGradient.addColorStop(0.5, '#a855f7');
        titleGradient.addColorStop(1, '#9333ea');
        teks("⚡ Gaya dan Gesekan - Hukum Newton II ⚡", canvas.width/2, 55, 'bold 22pt Segoe UI', titleGradient, 'center');

        // Label slider dengan style baru
        const labelGradient = ctx.createLinearGradient(0, 270, 0, 320);
        labelGradient.addColorStop(0, '#f3e8ff');
        labelGradient.addColorStop(1, '#e9d5ff');
        teks("Massa =", 80, 320, 'bold 16pt Segoe UI', labelGradient, 'left');
        slider(slider1);
        
        teks("Gaya =", 80, 380, 'bold 16pt Segoe UI', labelGradient, 'left');
        slider(slider2);
        
        teks("Koefisien Friksi =", 80, 440, 'bold 16pt Segoe UI', labelGradient, 'left');
        slider(slider3);

        // Tombol Reset dengan glow
        tombol("🔄 RESET SIMULASI", 450, 330, 170, 50, "bold 16pt Segoe UI", "#ffffff", "#a855f7", "#ffffff");

        index = index + 1;
        time = index / 100.0;
        oldv = v;

        if (index > 0) {
          a = (force + friction) / m;
          v = v + a / 100;
          x = x + v / 100;
        }

        // Objek keluar pada sisi lainnya - disesuaikan
        if (x > 8) {
          x = x - 16;
        } else if (x < -8) {
          x = x + 16;
        }

        xPos = canvas.width / 2 + 35 * x;
        boxSize = 35 * Math.sqrt(m);

        // Kotak beban dengan gradient ungu-metalik
        const boxGradient = ctx.createRadialGradient(
          xPos, yBase - boxSize/2, 0,
          xPos, yBase - boxSize/2, boxSize
        );
        boxGradient.addColorStop(0, '#c084fc');
        boxGradient.addColorStop(0.5, '#a855f7');
        boxGradient.addColorStop(1, '#9333ea');
        kotak(xPos - boxSize / 2, yBase - boxSize, boxSize, boxSize, 2, "#ffffff", boxGradient);

        // Bayangan kotak
        kotak(xPos - boxSize / 2 + 4, yBase - boxSize + 4, boxSize, boxSize * 0.3, 0, null, 'rgba(0,0,0,0.2)');

        // Lantai dengan gradient
        const floorGradient = ctx.createLinearGradient(0, yBase - 2, canvas.width, yBase + 2);
        floorGradient.addColorStop(0, '#d8b4
