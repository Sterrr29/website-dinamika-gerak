<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟣 Newton's Laws Simulations</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, 
                #8b5cf6 0%, 
                #a855f7 25%, 
                #c084fc 50%, 
                #d8b4fe 75%, 
                #e9d5ff 100%);
            color: #f3e8ff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating particles ungu */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 80px 70px, rgba(168,85,247,0.25), transparent),
                radial-gradient(1px 1px at 140px 40px, rgba(255,255,255,0.15), transparent);
            background-repeat: repeat;
            background-size: 200px 150px;
            animation: sparkle 25s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes sparkle {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 30px) rotate(360deg); }
        }

        h1 {
            font-size: clamp(2.5em, 6vw, 4em);
            background: linear-gradient(135deg, #f3e8ff, #e9d5ff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 50px;
            text-shadow: 0 8px 30px rgba(168, 85, 247, 0.6);
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 1px;
            position: relative;
        }

        @keyframes glow {
            from { 
                filter: drop-shadow(0 0 20px rgba(168,85,247,0.7));
                transform: scale(1);
            }
            to { 
                filter: drop-shadow(0 0 35px rgba(168,85,247,1));
                transform: scale(1.02);
            }
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            max-width: 1300px;
            padding: 30px;
        }

        .simulation {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 28px;
            box-shadow: 
                0 20px 60px rgba(139, 92, 246, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            padding: 35px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: clamp(320px, 35vw, 380px);
            position: relative;
            overflow: hidden;
        }

        .simulation::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .simulation:hover::before {
            left: 100%;
        }

        .simulation:hover {
            transform: translateY(-20px) scale(1.08);
            box-shadow: 
                0 40px 100px rgba(139, 92, 246, 0.6),
                0 0 50px rgba(168, 85, 247, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(168, 85, 247, 0.7);
        }

        .simulation img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            margin-bottom: 25px;
            position: relative;
        }

        .simulation:hover img {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5);
        }

        .simulation h2 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #e9d5ff, #f3e8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 20px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(168, 85, 247, 0.4);
        }

        .simulation p {
            font-size: 1.15em;
            color: #e9d5ff;
            line-height: 1.7;
            margin: 0;
            opacity: 0.92;
            font-weight: 400;
        }

        a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                gap: 30px;
                padding: 20px 15px;
            }
            
            .simulation {
                width: 100%;
                max-width: 380px;
                padding: 30px 25px;
            }
            
            h1 {
                margin-bottom: 30px;
            }
        }

        @media (max-width: 480px) {
            .container {
                flex-direction: column;
                align-items: center;
                gap: 25px;
            }
            
            .simulation {
                padding: 25px 20px;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #a855f7, #9333ea);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
        }
    </style>
</head>
<body>
    <h1>🌟 Explore Newton's Laws</h1>
    
    <div class="container">
        <a href="3newton.html" title="Launch HTML5 Newton's Laws Simulation">
            <div class="simulation">
                <img src="3newton/3newton.png" alt="HTML5 Newton's Laws Simulation" loading="lazy">
                <h2>🎮 HTML5 Simulation</h2>
                <p>Interactive real-time simulation of Newton's laws using HTML5 Canvas technology. Experience physics in motion!</p>
            </div>
        </a>
        
        <a href="3newtonb.html" title="Enter Virtual Physics Laboratory">
            <div class="simulation">
                <img src="3newtonb/3newtonb.png" alt="Virtual Physics Laboratory" loading="lazy">
                <h2>🔬 Virtual Lab</h2>
                <p>Advanced virtual laboratory environment for hands-on experimentation with Newton's principles. Dive into science!</p>
            </div>
        </a>
    </div>
</body>
</html>
