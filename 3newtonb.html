<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟣 OLabs Physics Simulation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, 
                #8b5cf6 0%, 
                #a855f7 25%, 
                #c084fc 50%, 
                #d8b4fe 75%, 
                #e9d5ff 100%);
            color: #f3e8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Floating particles effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.25), transparent),
                radial-gradient(2px 2px at 80px 70px, rgba(168,85,247,0.35), transparent),
                radial-gradient(1px 1px at 140px 50px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 200px 90px, rgba(139,92,246,0.25), transparent);
            background-repeat: repeat;
            background-size: 250px 180px;
            animation: sparkle 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes sparkle {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(25px, 25px) rotate(360deg); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 50px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 28px;
            box-shadow: 
                0 20px 60px rgba(139, 92, 246, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            width: 90%;
            max-width: 900px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.7s;
        }

        header:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 30px 80px rgba(139, 92, 246, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        header:hover::before {
            left: 100%;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: clamp(2.5em, 6vw, 4em);
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 50%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 6px 25px rgba(168, 85, 247, 0.6);
            animation: glow 2.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { 
                filter: drop-shadow(0 0 15px rgba(168,85,247,0.7));
            }
            to { 
                filter: drop-shadow(0 0 30px rgba(168,85,247,1));
            }
        }

        header p {
            font-size: 1.4em;
            color: #e9d5ff;
            margin: 0;
            opacity: 0.95;
            font-weight: 400;
            line-height: 1.6;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 85, 247, 0.35);
            border-radius: 28px;
            box-shadow: 
                0 25px 70px rgba(139, 92, 246, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            padding: 40px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 40px 100px rgba(139, 92, 246, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .simulation-link {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 50%, #7c3aed 100%);
            color: #f3e8ff !important;
            text-decoration: none;
            border-radius: 24px;
            font-size: 1.5em;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            box-shadow: 
                0 15px 45px rgba(168, 85, 247, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(168, 85, 247, 0.6);
        }

        .simulation-link::before {
            content: '🚀';
            font-size: 1.8em;
            transition: transform 0.3s ease;
        }

        .simulation-link::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .simulation-link:hover {
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 50%, #6d28d9 100%);
            transform: translateY(-6px) scale(1.08);
            box-shadow: 
                0 25px 70px rgba(168, 85, 247, 0.7),
                0 0 40px rgba(168, 85, 247, 0.5);
            border-color: rgba(168, 85, 247, 0.9);
        }

        .simulation-link:hover::before {
            transform: scale(1.2);
        }

        .simulation-link:hover::after {
            left: 100%;
        }

        .simulation-link:active {
            transform: translateY(-3px) scale(1.04);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 25px 30px;
            color: #d8b4fe;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(168, 85, 247, 0.25);
            width: 90%;
            max-width: 700px;
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.25);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { padding: 15px; }
            
            header { 
                padding: 30px 25px; 
                margin-bottom: 25px;
            }
            
            h1 { font-size: 2.2em; }
            
            .container { 
                padding: 30px 20px; 
                margin: 20px 10px;
            }
            
            .simulation-link {
                font-size: 1.3em;
                padding: 18px 35px;
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .simulation-link {
                font-size: 1.1em;
                padding: 16px 28px;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #a855f7, #9333ea);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #9333ea, #7c3aed);
        }
    </style>
</head>
<body>
    <header>
        <h1>🔬 OLabs Physics Simulation</h1>
        <p>🌟 Explore interactive physics simulations in an immersive purple universe. Click below to launch the OLabs simulation!</p>
    </header>

    <div class="container">
        <a href="https://www.olabs.edu.in/?sub=1&brch=1&sim=105&cnt=4" 
           target="_blank" 
           class="simulation-link" 
           title="Open OLabs Simulation in a new tab (Newton's Laws)">
            Launch OLabs Simulation
        </a>
    </div>

    <footer>
        <p>🌐 Linked to <strong>OLabs Interactive Simulations</strong> | 🟣 Powered by Purple Physics Portal</p>
    </footer>
</body>
</html>
